<style>

<script>
/* ============================ SLIDE CONTENT ============================ */

  <marker id="arrO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#ff9900"/></marker>
  <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#ff6b6b"/></marker>
</defs>`;

const slides = [];

/* ---- 1. COVER ---- */
slides.push(`
<div class="slide cover">
  <svg class="chip" viewBox="0 0 120 120">

    ${[...Array(5)].map((_,i)=>`<line x1="${34+i*13}" y1="26" x2="${34+i*13}" y2="12" stroke="#7aa2ff" stroke-width="2"/><line x1="${34+i*13}" y1="94" x2="${34+i*13}" y2="108" stroke="#7aa2ff" stroke-width="2"/><line x1="26" y1="${34+i*13}" x2="12" y2="${34+i*13}" stroke="#7aa2ff" stroke-width="2"/><line x1="94" y1="${34+i*13}" x2="108" y2="${34+i*13}" stroke="#7aa2ff" stroke-width="2"/>`).join('')}
    <circle cx="60" cy="60" r="52" fill="none" stroke="#7aa2ff" stroke-width="2" stroke-dasharray="4 5" opacity="0.7"/>
  </svg>
  <div class="kicker">A foundations primer · Part IV</div>
  <h1>Tools That <span class="hl">Teach</span></h1>
  <div class="tagline">Building AI that leaves its user <b style="color:var(--accent2)">more capable</b>, not less — the tool-builder's answer to Part III. If the assistant optimizes only for finishing the task, it manufactures the very skill-atrophy Part III diagnosed. Here is how to design against that.</div>
  <div class="epi">
    <p>"I never guess. It is a shocking habit — destructive to the logical faculty."</p>
    <span class="att">— Sir Arthur Conan Doyle, Sherlock Holmes · the whole deck is about tools that <i>refuse to silently guess</i> — that surface the doubt instead of hiding it.</span>
  </div>
  <div class="eduband"><b>For builders.</b> This is for the people who design the model, the assistant, and its reward — model researchers, agent/tool builders, and reward engineers. It teaches design <i>directions and their tradeoffs</i>, uses only public, industry-standard ideas, names no product, and marks research-grade ideas as such. Several are open problems, not shipped features.</div>
  <div class="badgerow">
    <div class="badge"><b>Audience:</b> model researchers · assistant &amp; agent builders · reward/eval engineers</div>
    <div class="badge"><b>Question:</b> can the tool foster the judgment it currently erodes?</div>
    <div class="badge"><b>Stance:</b> mechanisms + honest tradeoffs, not a product pitch</div>
  </div>
  <div class="contact"><b>Shrikant Sundaram</b></div>
  <div class="xlink"><a href="https://slnu.github.io/Design-Verification-Cycle/#1">← Part I: The DV Cycle</a> · <a href="part2.html">← Part II: The Limits of Translation</a> · <a href="part3.html">← Part III: Learning to Verify</a></div>
  ${foot('01 · Title')}
</div>`);

/* ---- 2. CONTENTS ---- */
slides.push(`
<div class="slide">
  <div class="kicker">What we'll cover</div>
  <h2 class="title">Contents <span class="hl">— click any section to jump</span></h2>
  <div class="sub">The series, in one line each: <b>I</b> — the DV cycle. <b>II</b> — why verification persists when AI writes the RTL. <b>III</b> — how a human earns the judgment to catch the model. <b>IV</b> — how the <i>builder</i> shapes the tool so it grows that judgment instead of eroding it. This deck expands Part III's one bullet, "shape the tool, not just the person," into its own set of mechanisms — grouped by the three levers a builder actually controls.</div>
  <div class="body"><div class="col">
    <div class="toc">
      ${[
        ['0','Part III in 30 seconds','Self-contained recap: the one idea + the four pitfalls, for readers who skipped Part III','3','3'],
        ['1','The flip: an assistant that sharpens','Default assistants optimize task completion — and manufacture those pitfalls; redefine the objective','4','4'],
        ['2','You get what you measure — three levers','Product/UX, Reward, and Eval: where a builder can move the objective','5','5'],
        ['3','Lever 1 · Modes that scope the help','TUTOR / SPAR / DO — the earn-vs-delegate line as config, not exhortation','6','6'],

        ['7','Lever 2 · Make it attack its own green','Self-adversarial pass — the fix for the gameable-artifact recursion','10','10'],
        ['8','Lever 3 · Measure the right thing','Ambiguity-recovery and student-transfer evals','11','11'],
        ['9','The honest tradeoffs','Every mechanism can be gamed one level up — including these','12','12'],

  </div></div>
  ${foot('02 · Contents')}

/* ---- 3. PART III IN 30 SECONDS (self-contained recap) ---- */
slides.push(`
<div class="slide">
  <div class="kicker">If you're here for the models, start here</div>
  <h2 class="title">Part III in <span class="hl">30 seconds</span></h2>
  <div class="sub">This deck is for tool-builders and doesn't assume you read Part III (which was for DV engineers). Everything below stands on these four observations about what happens when a capable model meets a human still learning the craft. Each later mechanism cites which one it counters.</div>
  <div class="body">
    <div class="col">
      <div class="card"><h3>The one idea everything rests on</h3>
      <p class="small"><b>Understanding is not visible in the artifact.</b> A piece of work produced with real understanding and one produced by pasting a model's output can look <i>identical</i> on the page. You cannot read comprehension off the deliverable — you can only find it by probing. That single fact is why "it compiles / it passed / it looks right" never proves the person (or the model) understood anything.</p></div>
      ${risk("This is the human version of Part II's thesis: conformance (it looks right) is not correctness (it is right, and understood). A benchmark score that doesn't generalize is the same failure — the eval passed, the capability never formed.")}
    </div>
    <div class="col">
      <div class="card"><h3>The four pitfalls this deck designs against</h3>
      <ul class="clean">
        <li><b>Hollow deliverable</b> — output that looks complete with no understanding beneath it. <span class="def">(fast, impressive, empty when probed)</span></li>
        <li><b>Capable-only-when-pushed ("Pattern B")</b> — the person can produce the right answer <i>when asked the exact question</i>, but never self-initiates the check — so a senior must push every task. Judgment outsourced upward; doesn't scale.</li>
        <li><b>Accept-the-oracle-blindly ("the oracle-trap")</b> — a confident wrong verdict taken at face value, no independent check.</li>
        <li><b>Guess-on-ambiguity</b> — silently picking a default where the spec was silent, instead of surfacing the gap.</li>
      </ul></div>
      <div class="note">Part III's answer for the <b>human</b>: earn judgment by hand, spar with the model instead of obeying it, predict-then-verify, and be suspicious of your own green. <b>Part IV asks the builder to make the tool support all of that</b> — that's the whole deck.</div>
    </div>
  </div>
  <div class="plain"><span class="lvl">In plain terms</span> A model can hand someone work they don't understand — and you can't tell from the output. <b>Four ways that goes wrong; the rest of this deck is how the tool can push back on each.</b></div>
  ${foot('03 · Part III in 30 seconds')}
</div>`);

/* ---- 4. THE FLIP ---- */
slides.push(`
<div class="slide">
  <div class="kicker">The flip</div>
  <h2 class="title">Redefine what the assistant is <span class="hl">optimizing for</span></h2>
  <div class="sub">A default assistant is scored on <i>finishing the task</i> — accept-rate, latency, thumbs-up. Optimize that alone and you get exactly Part III's failures: it produces the hollow deliverable, answers only when pushed, asserts confidently, and guesses on silence. The reframe: the assistant's job is not just to produce the artifact — it is to <b>leave the user more capable of producing the next one without it</b>.</div>
  <div class="body">
    <div class="col">
      <svg class="dg" viewBox="0 0 520 300" preserveAspectRatio="xMidYMid meet">
        ${DEFS}
        <rect x="0" y="0" width="520" height="300" fill="#0c1222"/>
        <!-- default path -->
        <text x="150" y="30" text-anchor="middle" fill="#ff9a9a" font-size="12" font-weight="800">OPTIMIZE: finish the task</text>
        <rect x="60" y="46" width="180" height="40" rx="9" class="box"/><text x="150" y="70" text-anchor="middle" class="lbl">accept-rate · latency · 👍</text>
        <path d="M150 86 L150 118" class="flowR"/>
        <rect x="40" y="120" width="220" height="52" rx="10" fill="#25121a" stroke="#ff6b6b"/>
        <text x="150" y="141" text-anchor="middle" fill="#ff9a9a" class="lbls">user ships it, learns nothing;</text>
        <text x="150" y="158" text-anchor="middle" fill="#ff9a9a" class="lbls">next task still needs the tool</text>
        <text x="150" y="196" text-anchor="middle" fill="#ff9a9a" class="lbls">dependence ↑ · capability flat</text>
        <!-- cognizant path -->
        <text x="380" y="30" text-anchor="middle" fill="#8fe0b6" font-size="12" font-weight="800">OPTIMIZE: leave them capable</text>
        <rect x="290" y="46" width="180" height="40" rx="9" class="box"/><text x="380" y="65" text-anchor="middle" class="lbls">did a later turn show</text><text x="380" y="80" text-anchor="middle" class="lbls">the user reasoning?</text>
        <path d="M380 86 L380 118" class="flow2"/>
        <rect x="270" y="120" width="220" height="52" rx="10" fill="#0f2018" stroke="#39d98a"/>
        <text x="380" y="141" text-anchor="middle" fill="#8fe0b6" class="lbls">user finishes AND understands;</text>
        <text x="380" y="158" text-anchor="middle" fill="#8fe0b6" class="lbls">next task needs the tool less</text>
        <text x="380" y="196" text-anchor="middle" fill="#8fe0b6" class="lbls">capability ↑ · trust earned</text>
      </svg>
    </div>
    <div class="col">
      <div class="card"><h3>The four pitfalls this deck designs against</h3>
      <ul class="clean">
        <li><b>Hollow deliverable</b> — output that looks right with no understanding beneath it.</li>
        <li><b>Capable-only-when-pushed</b> — right answer on demand, never self-initiated.</li>
        <li><b>Accept-the-oracle-blindly</b> — a confident wrong verdict taken at face value.</li>
        <li><b>Guess-on-ambiguity</b> — silently picking a default where the spec was silent.</li>
      </ul>
      <p class="small" style="margin-top:9px">All four are what Part III told the <i>human</i> to resist. Part IV asks the <b>builder</b> to make the tool resist them too — because the tool is part of the environment that shapes the human.</p></div>
      ${risk("The reframed objective is far harder to measure than accept-rate — 'did the user get more capable?' is delayed, sparse, and easy to fake. The rest of this deck is really about finding observable proxies for it without rewarding the proxy instead of the goal (Part II's lesson, aimed back at ourselves).")}

      <p class="small">Sample interactions, then quiz a <b>held-out / rotating</b> student model (and, opt-in, real users) on the mechanism <b>with the artifact removed</b>. A response that leaves the user able to explain it beats one that leaves them blank — the most direct read on "fostered understanding." Keep it a <b>diagnostic eval, not a reward source</b>: rewarding a single proxy-student just teaches-to-the-proxy (the slide-12 rule, applied to ourselves), and attribution needs a control (did the tool cause the gain?).</p>
      ${ptag("hollow deliverable")}${ptag("atrophy")}</div>
      ${risk("Both evals are hard on purpose — they measure the goal, not a proxy — but each has a sharp edge: ambiguity-recovery over-triggers into a clarification-question machine users route around, and its gap-set is contested; student-transfer is delayed, sparse, hard to attribute, and gameable the moment it becomes a reward. These are why eval is the keystone lever and the last one you should automate into training.")}
    </div>
  </div>
  <div class="plain"><span class="lvl">In plain terms</span> Build two hard tests: <b>did the tool ask about what the spec left unsaid</b>, and <b>can the user still explain the answer with the tool taken away</b>. If you can measure those, you can train for them.</div>
  ${foot('11 · Measure the right thing')}
</div>`);

/* ---- 11. HONEST TRADEOFFS ---- */
slides.push(`
<div class="slide">
  <div class="kicker">The honest part</div>
  <h2 class="title">Every mechanism can be gamed <span class="hl">one level up</span></h2>
  <div class="sub">This is Part II's lesson turned on ourselves. None of these is free, and each recreates a failure at a higher level if shipped naively. A builder who ignores that ships the very pitfalls they meant to fix.</div>
  <div class="body">
    <div class="col">
      <table class="matrix">
        <tr><th>Mechanism</th><th>How it backfires</th></tr>
        <tr><td><b>Modes / gates</b></td><td>Friction under deadline → users flip to DO or disable it; the at-risk user opts out.</td></tr>
        <tr><td><b>No-guess flags</b></td><td>Over-flag → click-through; complacency at the chip level.</td></tr>
        <tr><td><b>Provenance / hedging</b></td><td>Alarm fatigue; users learn to ignore the hedge — the hedge becomes noise.</td></tr>
        <tr><td><b>Self-attack</b></td><td>Shares the generator's blind spots; can produce a confident hollow artifact.</td></tr>
        <tr><td><b>Pattern-B telemetry</b></td><td>If a lead sees it, becomes a gamed metric = the micromanagement we opposed.</td></tr>
      </table>
    </div>
    <div class="col">
      <div class="card"><h3>The meta-rule for builders</h3>
      <ul class="clean">
        <li><b>Reward survival, not existence.</b> A rationale, a hedge, a clarifying question can all be produced hollowly. Reward the ones that <i>survive an adversarial check</i> — never the ones that merely appear.</li>
        <li><b>Watch for complacency at the new level.</b> Any signal shown often enough gets ignored; any friction added gets routed around. Design assuming your own mechanism will be gamed.</li>
        <li><b>Keep agency with the human.</b> The tool makes the probe cheaper and more frequent — it never <i>certifies</i> understanding, because (Part III slide 4) understanding isn't observable in any artifact the tool can produce.</li>
        <li><b>Count the cost — it compounds.</b> These mechanisms stack: verdict schema, a self-attack pass (~2× inference), calibration reasoning, extra turns. The honest baseline is a fast "just do it" assistant, and the capability gain has to beat a real per-turn latency-and-cost tax — the top driver of abandonment.</li>
      </ul></div>
      ${risk("The deepest trap: a mechanism that makes hollow work look earned is worse than no mechanism — it defeats the human reviewer's instinct that something is thin. If you can't ground a check (tool-verified fact, independent critic, recoverable ground truth), you may be adding confidence without adding correctness — the exact thing this whole series warns against.")}
    </div>
  </div>
  <div class="plain"><span class="lvl">In plain terms</span> Assume users will game every guardrail you add — and assume your model will too. <b>Reward what survives an attack, not what merely shows up</b>, and never let the tool claim it has verified understanding it cannot see.</div>
  ${foot('12 · Honest tradeoffs')}
</div>`);

/* ---- 12. UNIFYING THREAD ---- */
slides.push(`
<div class="slide">
  <div class="kicker">The one thread</div>
  <h2 class="title">Wrong-and-confident is the enemy — <span class="hl">calibration is the spine</span></h2>
  <div class="sub">Across product, reward, and eval, one property links every mechanism worth building. The danger was never that the model is sometimes wrong — a calibrated one that <i>says so</i> turns each failure into a sparring prompt.</div>
  <div class="body">
    <div class="col">
      <svg class="dg" viewBox="0 0 520 280" preserveAspectRatio="xMidYMid meet">
        ${DEFS}
        <rect x="0" y="0" width="520" height="280" fill="#0c1222"/>
        <line x1="60" y1="235" x2="470" y2="235" stroke="#2b3a5e" stroke-width="1.5"/>
        <line x1="120" y1="30" x2="120" y2="235" stroke="#2b3a5e" stroke-width="1.5" stroke-dasharray="3 3"/>
        <text x="270" y="262" text-anchor="middle" class="lbls">confidence →</text>
        <text x="42" y="130" text-anchor="middle" class="lbls" transform="rotate(-90 42 130)">correctness →</text>
        <circle cx="180" cy="70" r="8" fill="#39d98a"/><text x="180" y="56" text-anchor="middle" fill="#8fe0b6" class="lbls">right + confident ✓</text>
        <circle cx="180" cy="200" r="9" fill="#ff6b6b"/><text x="180" y="222" text-anchor="middle" fill="#ff9a9a" class="lbls">WRONG + confident — the enemy</text>
        <circle cx="370" cy="120" r="7" fill="#ffcc66"/><text x="370" y="104" text-anchor="middle" fill="#ffe1a3" class="lbls">unsure + says so →</text>
        <text x="370" y="140" text-anchor="middle" fill="#ffe1a3" class="lbls">becomes a sparring prompt</text>
        <text x="270" y="24" text-anchor="middle" class="kbig" fill="#cfdaee">the tool should know — and show — what it doesn't know</text>
      </svg>
    </div>
    <div class="col">
      <div class="card"><h3>Calibration is what ties the deck together</h3>
      <ul class="clean">
        <li><b>Provenance (slide 8)</b> exposes confidence as evidence — a claim you can weigh.</li>
        <li><b>Asymmetric reward (slide 9)</b> makes confident-wrong the most expensive output.</li>
        <li><b>Self-attack (slide 10)</b> is the model measuring its own confidence against an attack.</li>
        <li><b>A tool that flags its own uncertainty</b> converts the oracle-trap into an invitation to think — the single behavior that most directly grows the user.</li>
      </ul>
      <p class="small" style="margin-top:9px">This is the same thread with three faces across the series: <b>calibrated confidence</b> (Part I — a "high" verdict only when you've actually ruled the alternatives out), <b>calibrated trust</b> (Part III — trust the model where verifying is cheap, doubt it where being wrong is expensive), and here <b>a calibrated tool</b> that shows what it doesn't know.</p></div>
      <div class="cite">Related public ideas — <b>calibration / proper scoring rules</b>, <b>process reward models</b>, <b>RL with verifiable rewards</b>, and human-factors work on <b>automation complacency</b> (Parasuraman &amp; Riley). <i>Directions, several research-grade; attributions to be verified against primary sources before publication.</i></div>
    </div>
  </div>
  <div class="plain"><span class="lvl">In plain terms</span> The fix that runs through everything: <b>build a tool that knows what it doesn't know and says so.</b> A confident wrong answer traps the user; an honest "I'm not sure, here's why" invites them to think.</div>
  ${foot('13 · The unifying thread')}
</div>`);

/* ---- 13. CLOSE ---- */
slides.push(`
<div class="slide cover">
  <div class="kicker">The through-line</div>
  <h2 class="title" style="font-size:38px">The tool worth building is the one that <span class="hl">makes its user need it less</span></h2>
  <div class="quote" style="margin-top:14px;font-size:22px">
    Part III asked the human to earn judgment. Part IV asks the <span class="hl">builder</span> to make the tool foster it — by scoping the help, refusing to guess, showing its work, rewarding reasoning over answers, attacking its own green, and measuring whether the user actually grew. All of it reduces to one property: <span class="hl">know what you don't know, and show it.</span>
  </div>
  <div class="epi" style="margin-top:16px">
    <p>"Education never ends, Watson. It is a series of lessons, with the greatest for the last."</p>
    <span class="att">— Arthur Conan Doyle, Sherlock Holmes · a tool that teaches is one whose lessons don't end when the task does — it leaves the user readier for the next, harder one.</span>
  </div>
  <div class="badgerow" style="margin-top:20px">
    <div class="badge"><b>Grade the tool on the user's capability, not the task's completion</b></div>
    <div class="badge"><b>Never guess silently — surface the doubt</b></div>
    <div class="badge"><b>Reward what survives an attack, not what merely appears</b></div>
    <div class="badge"><b>Calibration is the spine</b></div>
  </div>
  <div class="sub" style="margin-top:18px">These are directions, not shipped features — several are open research problems, and every one can be gamed one level up. But the target is clear and it closes the series: verification moves up to independent proof (Part II), the human earns the judgment to supply it (Part III), and the tools we build should <b>sharpen that judgment rather than quietly spend it down</b> (Part IV). Build the assistant that argues with you — not the one that answers for you.</div>
  ${foot('14 · Close')}
</div>`);

/* ============================ ENGINE ============================ */
const deck = document.getElementById('deck');
deck.innerHTML = slides.join('');
const S = [...document.querySelectorAll('.slide')];
let i = 0;
function show(n){
  i = Math.max(0, Math.min(S.length-1, n));
  S.forEach((s,k)=>s.classList.toggle('active', k===i));
  document.getElementById('prog').style.width = ((i)/(S.length-1)*100)+'%';
  document.getElementById('num').textContent = (i+1)+' / '+S.length;
  location.hash = i+1;
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ') {show(i+1);e.preventDefault();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){show(i-1);e.preventDefault();}
  else if(e.key==='Home'){show(0);}
  else if(e.key==='End'){show(S.length-1);}
  else if(e.key.toLowerCase()==='f'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
  else if(e.key.toLowerCase()==='p'){window.print();}
  else if(e.key.toLowerCase()==='o'){document.body.classList.toggle('ov');}
});
deck.addEventListener('click',e=>{ if(e.clientX > window.innerWidth*0.62) show(i+1); else if(e.clientX < window.innerWidth*0.18) show(i-1); });
const start = parseInt(location.hash.replace('#',''))||1; show(start-1);
</script>
</body>
