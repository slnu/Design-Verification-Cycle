<div class="slide">
  <div class="kicker">The through-line · the question is old</div>
  <h2 class="title">If AI writes the RTL, <span class="hl">is verification obsolete?</span></h2>
  <div class="sub">The instinct to cut <b>DV</b> <span class="def">(design verification)</span> is <i>pre-AI</i> — teams have questioned it for years. Part II's answer holds even under the strongest assumption: a translator <b>100% faithful to the spec</b>.</div>
  <div class="plain"><span class="lvl">In plain terms</span> Verification is the long pole not because the team is slow, but because it is sized to the <b>whole problem</b>, not to the spec. So the tempting cut is a trap: <b>cutting the long pole doesn't shrink the problem — it only removes the evidence that the problem was solved.</b> The saving is small and certain; the escape it risks is a full respin — and silicon can't be patched in the field.</div>

        ].map(([t,x0,x1,k],i)=>{const y=44+i*18;const C={a:['#101c36','#7aa2ff'],d:['#2a1f08','#ff9900'],p:['#221a33','#c99bff'],v:['#14332f','#2bd4c4']}[k];const tc={a:'#7aa2ff',d:'#cfdaee',p:'#c99bff',v:'#2bd4c4'}[k];return `<text x="168" y="${y+9}" text-anchor="end" fill="${tc}" style="font-size:8px">${t}</text><rect x="${x0}" y="${y}" width="${x1-x0}" height="12" rx="3" fill="${C[0]}" stroke="${C[1]}" stroke-width="${k==='v'?1.6:1.2}"/>`;}).join('')}

/* ---- 4. THESIS: conformance vs correctness ---- */
slides.push(`
<div class="slide">
  <div class="kicker">The thesis · 1 of 2</div>
  <h2 class="title">Conformance vs correctness — <span class="hl">the distinction, precisely</span></h2>
  <div class="sub">Conformance is a <b>translation</b> problem. Correctness is a <b>distribution</b> problem. Different problems, different tools — and a perfect translator only ever solves the first.</div>
  <div class="plain"><span class="lvl">In plain terms</span> "We built what the spec said" is <b>not</b> the same as "the thing actually works everywhere it'll be used." A flawless translator guarantees the first; only verification earns the second — same as a model acing its evals ≠ being right in the wild.</div>
  <div class="body">
    <div class="col">
      <div class="card"><h3>Conformance = matches the document</h3>
      <p class="small"><b>"We built what the spec asked for"</b> — a faithfulness relation between two documents (spec ↔ design). A perfect spec-to-RTL translator maxes this out <i>by definition</i>. If conformance were the whole job, an ideal translator would end verification.</p></div>
      <div class="card" style="margin-top:12px"><h3>Correctness = robust over the state-space</h3>
      <p class="small"><b>"The thing behaves as it must across the entire reachable state space"</b> — most of which the spec never describes. Real silicon is <i>sequential</i>: behavior is a trajectory through an astronomically large state space, not a single output. The spec is a behavior <i>description</i>, not an <i>enumeration</i>. <span class="def">(Correctness spans two axes: genuine distribution-shift, and rare reachable-state conjunctions that are perfectly in-distribution and legal — most hardware corners are the latter.)</span></p></div>
      <div class="card" style="margin-top:12px"><h3>Why a perfect translator cannot reach it</h3>
      <p class="small">The translator's ceiling is its input. Perfect fidelity to a document that under-specifies behavior faithfully reproduces the under-specification. Garbage-in is not required — <b>silence-in is enough</b>.</p></div>
    </div>
    <div class="col">
      <div class="card"><h3>A concrete example</h3>
      <p class="small">A control block modeled as an <b>FSM</b> <span class="def">(finite state machine: control logic whose output depends on accumulated history, not just current inputs)</span> with 12 named states + legal transitions is a faithful, translatable description. But 12 states plus a few concurrent flags, counters, and in-flight requests yields <i>millions</i> of reachable composite states. A translator reproduces the 12 named states perfectly (conformance); whether the machine is safe in the millions of unnamed composite states is correctness — unanswerable by reading either document.</p></div>
      ${ai("CONFORMANCE :: the model passes the given evals / matches the reference outputs. CORRECTNESS :: the model is robust over the full input-and-state distribution it is deployed into. Every team here has shipped a model that aced its eval suite and then failed on the rare, in-distribution tail its evals never sampled (and sometimes on genuine distribution-shift too) — that failure is not a translation bug, it is the correctness axis the eval suite never measured. Sharpest version: if one model both TRANSLATES the spec into RTL and GENERATES its own checker, conformance evidence becomes self-referential — grading a policy against its own outputs, which certifies nothing without an independent, spec-anchored oracle (the circularity argument, section 4).")}
    </div>
  </div>
  ${foot('04 · Conformance vs correctness')}
</div>`);

/* ---- 5. THESIS: why the gap is permanent ---- */
slides.push(`

  document.getElementById('prog').style.width = ((i)/(S.length-1)*100)+'%';
  document.getElementById('num').textContent = (i+1)+' / '+S.length;
  location.hash = i+1;
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ') {show(i+1);e.preventDefault();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){show(i-1);e.preventDefault();}
  else if(e.key==='Home'){show(0);}
  else if(e.key==='End'){show(S.length-1);}
  else if(e.key.toLowerCase()==='f'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
  else if(e.key.toLowerCase()==='p'){window.print();}
  else if(e.key.toLowerCase()==='o'){document.body.classList.toggle('ov');}
});
deck.addEventListener('click',e=>{ if(e.clientX > window.innerWidth*0.62) show(i+1); else if(e.clientX < window.innerWidth*0.18) show(i-1); });
const start = parseInt(location.hash.replace('#',''))||1; show(start-1);
</script>
</body>
</html>
