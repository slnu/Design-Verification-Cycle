<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>

<title>Learning to Verify — Building Deep DV Judgment in the Era of LLMs (Part III)</title>
<style>
  :root{

    --ink:#e9eef7; --muted:#9fb0cc; --line:#2b3a5e;

    --accent2:#2bd4c4;    /* teal */

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 700px at 70% -10%, #17233f 0%, var(--bg) 55%);

    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  #deck{height:100vh;width:100vw;position:relative}
  .slide{
    position:absolute;inset:0;display:none;flex-direction:column;
    padding:44px 64px 70px;opacity:0;transition:opacity .25s ease;
  }
  .slide.active{display:flex;opacity:1}
  h1,h2,h3{margin:0;line-height:1.12}
  .kicker{color:var(--accent);font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:13px;margin-bottom:10px}
  h2.title{font-size:35px;font-weight:800;letter-spacing:-.5px}
  h2.title .hl{color:var(--accent)}
  .sub{color:var(--muted);font-size:15.5px;margin-top:9px;max-width:1090px;line-height:1.5}
  .sub b{color:#cfe}
  .body{flex:1;display:flex;gap:26px;margin-top:16px;min-height:0}
  .col{flex:1;min-width:0}
  .card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:15px 17px}
  .card h3{font-size:15px;color:var(--accent2);margin-bottom:7px;letter-spacing:.02em}
  ul.clean{margin:5px 0 0;padding-left:18px}
  ul.clean li{margin:6px 0;color:#cfdaee;font-size:14px;line-height:1.46}
  ul.clean li b{color:#fff}
  .ai{background:linear-gradient(180deg,#241a08,#1a1405);border:1px solid #6b4c12;border-radius:12px;padding:12px 15px;margin-top:12px}
  .ai .tag{color:var(--accent);font-weight:800;font-size:12px;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .ai p{margin:6px 0 0;color:#f0dcb8;font-size:13.5px;line-height:1.46}
  .ai .bulb{width:16px;height:16px;display:inline-block}
  .footer{position:absolute;left:64px;right:64px;bottom:24px;display:flex;justify-content:space-between;align-items:center;color:#63769a;font-size:12.5px;border-top:1px solid var(--line);padding-top:12px}
  .footer .brand{font-weight:700;color:#8fa3c6;letter-spacing:.04em}
  .progress{position:absolute;left:0;bottom:0;height:3px;background:var(--accent);transition:width .25s}
  .num{position:absolute;right:20px;bottom:22px;color:#5b6d90;font-size:12px}
  .hint{position:absolute;left:20px;bottom:22px;color:#3d4c6b;font-size:11px}
  svg{width:100%;height:100%;display:block}
  .dg{width:100%;height:100%;min-height:0}
  text{font-family:"Segoe UI",Roboto,Arial,sans-serif}
  .lbl{fill:var(--ink);font-size:13px}
  .lbls{fill:var(--muted);font-size:11px}
  .box{fill:var(--panel2);stroke:var(--line);stroke-width:1.4}
  .flow{stroke:var(--muted);stroke-width:2;fill:none;marker-end:url(#arr)}
  .flow2{stroke:var(--accent2);stroke-width:2;fill:none;marker-end:url(#arrT)}
  .flowO{stroke:var(--accent);stroke-width:2.4;fill:none;marker-end:url(#arrO)}
  .flowR{stroke:var(--bad);stroke-width:2;fill:none;marker-end:url(#arrR)}

  .cover{align-items:flex-start;justify-content:center}
  .cover .chip{width:104px;height:104px;margin-bottom:20px}
  .cover h1{font-size:52px;font-weight:800;letter-spacing:-1px;max-width:1120px}
  .cover h1 .hl{color:var(--accent)}
  .cover .tagline{color:var(--muted);font-size:19px;margin-top:16px;max-width:960px;line-height:1.5}
  .badgerow{margin-top:22px;display:flex;gap:12px;flex-wrap:wrap}
  .badge{background:#16203a;border:1px solid var(--line);border-radius:10px;padding:9px 15px;font-size:13.5px;color:#cfe;}
  .badge b{color:var(--accent)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:15px}
  .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px}
  .note{color:var(--muted);font-size:12.6px;font-style:italic;margin-top:8px}
  .note b{color:#cfe;font-style:normal}
  .quote{font-size:24px;font-weight:600;line-height:1.4;max-width:1050px;color:#fff}
  .quote .hl{color:var(--accent)}
  .small{font-size:13.2px;color:#cfdaee;line-height:1.46}
  .small b{color:#fff}
  .ex{background:#0f1b31;border:1px dashed #3a4d78;border-radius:10px;padding:9px 13px;margin-top:9px;font-size:13px;color:#cfdaee;line-height:1.45}
  .ex .xt{color:var(--accent3);font-weight:800;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;margin-right:8px}
  .ex b{color:#fff}
  table.matrix{width:100%;border-collapse:collapse;font-size:12.8px}
  table.matrix th,table.matrix td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
  table.matrix th{background:#1b2743;color:var(--accent2);font-weight:700}
  table.matrix td b{color:#fff}
  table.matrix tr:nth-child(even) td{background:#111a30}
  .disc{position:fixed;top:10px;right:16px;font-size:10.5px;color:#3d4c6b}
  .contact{color:var(--muted);font-size:14px;margin-top:18px}
  .contact b{color:#cfe}
  .xlink{margin-top:10px;font-size:13.5px}
  .xlink a{color:var(--accent2);text-decoration:none;border-bottom:1px dotted var(--accent2)}
  .toc{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .agrow{display:flex;align-items:center;gap:16px;background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:12px;padding:9px 18px;cursor:pointer;transition:border-color .15s ease,transform .15s ease}
  .agrow:hover{border-color:var(--accent);transform:translateX(5px)}
  .agrow .n{flex:0 0 32px;height:32px;border-radius:9px;background:#1b2743;color:var(--accent);font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center}
  .agrow .t{font-size:14.5px;color:#fff;font-weight:700}
  .agrow .d{font-size:12.2px;color:var(--muted);margin-top:1px}
  .agrow .pg{margin-left:auto;color:#63769a;font-size:12px;white-space:nowrap;padding-left:14px}
  .def{color:#9fb0cc;font-weight:400}
  .eduband{background:#0f2320;border:1px solid var(--accent2);border-radius:12px;padding:12px 16px;margin-top:20px;max-width:1000px;color:#bfeee7;font-size:14px;line-height:1.5}
  .eduband b{color:var(--accent2)}
  .edutag{position:fixed;top:10px;left:16px;font-size:10.5px;color:#0c1222;background:var(--accent2);border-radius:5px;padding:2px 9px;font-weight:800;letter-spacing:.06em;z-index:5}
  .plain{margin-top:8px;font-size:14.5px;line-height:1.4;color:#dfe9ff;background:#122038;border-left:3px solid var(--accent2);border-radius:0 8px 8px 0;padding:7px 13px;max-width:1080px}
  .plain b{color:var(--accent2);font-weight:700}
  .plain .lvl{color:var(--accent2);font-weight:800;font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-right:8px}
  .lens{display:flex;gap:12px;margin-top:9px;max-width:1080px;flex-wrap:wrap}
  .lens .l2{flex:1;min-width:300px;border-radius:0 8px 8px 0;padding:7px 13px;font-size:13px;line-height:1.42;color:#dfe9ff}
  .lens .lic{border-left:3px solid var(--accent3);background:#111c33}
  .lens .llead{border-left:3px solid var(--accent);background:#221a08}
  .lens .ll{font-weight:800;font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;margin-right:8px}
  .lens .lic .ll{color:var(--accent3)}
  .lens .llead .ll{color:var(--accent)}
  .lens b{color:#fff}
  .epi{border-left:3px solid var(--accent);padding:6px 0 6px 18px;margin:18px 0 0;max-width:1000px}
  .epi p{margin:0;color:#e9eef7;font-size:16px;font-style:italic;line-height:1.5}
  .epi .att{color:var(--muted);font-size:12.8px;font-style:normal;margin-top:7px;display:block}
  .cite{margin-top:8px;font-size:11.5px;color:#5b6d90;font-style:normal}
  .cite b{color:#8fa3c6;font-style:normal}
  @media print{
    body{overflow:visible;background:#0c1222 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    #deck{height:auto}
    .slide{display:flex !important;opacity:1 !important;position:relative;height:100vh;page-break-after:always;inset:auto}
    .progress,.num,.hint{display:none !important}
  }
</style>
</head>
<body>
<div class="disc">Educational • Generic industry example • No proprietary/program-specific content</div>
<div class="edutag">EDUCATION ONLY</div>
<div id="deck"></div>
<div class="progress" id="prog"></div>
<div class="num" id="num"></div>
<div class="hint">← → navigate · F fullscreen · O overview · P print/PDF</div>

<script>
/* ============================ SLIDE CONTENT ============================ */
const bulb = '<svg class="bulb" viewBox="0 0 24 24" fill="none" stroke="#ff9900" stroke-width="2"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10c1 1 1.5 2 1.5 3h5c0-1 .5-2 1.5-3A6 6 0 0 0 12 3z"/></svg>';
/* ai() and foot() take DOUBLE-quoted args so apostrophes inside are harmless; interior quotes use curly “ ” */
function ai(txt){return `<div class="ai"><div class="tag">${bulb} Where the LLM helps a learner — and where it quietly hurts</div><p>${txt}</p></div>`;}
function foot(t){return `<div class="footer"><span class="brand">Design Verification — Foundations · Part III</span><span>${t}</span></div>`;}
/* dual-perspective callout — IC (blue) and LEAD (orange) */
function lens(ic,lead){return `<div class="lens"><div class="l2 lic"><span class="ll">IC →</span>${ic}</div><div class="l2 llead"><span class="ll">Lead →</span>${lead}</div></div>`;}

const DEFS = `<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#9fb0cc"/></marker>
  <marker id="arrT" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2bd4c4"/></marker>
  <marker id="arrO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#ff9900"/></marker>
  <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#ff6b6b"/></marker>
</defs>`;

const slides = [];

/* ---- 1. COVER ---- */
slides.push(`
<div class="slide cover">
  <svg class="chip" viewBox="0 0 120 120">
    <rect x="26" y="26" width="68" height="68" rx="8" fill="#16203a" stroke="#ff9900" stroke-width="2.5"/>
    <rect x="42" y="42" width="36" height="36" rx="4" fill="#1d2a49" stroke="#2bd4c4" stroke-width="2"/>
    <text x="60" y="64" fill="#2bd4c4" font-size="12" text-anchor="middle" font-weight="700">DUT</text>
    ${[...Array(5)].map((_,i)=>`<line x1="${34+i*13}" y1="26" x2="${34+i*13}" y2="12" stroke="#7aa2ff" stroke-width="2"/><line x1="${34+i*13}" y1="94" x2="${34+i*13}" y2="108" stroke="#7aa2ff" stroke-width="2"/><line x1="26" y1="${34+i*13}" x2="12" y2="${34+i*13}" stroke="#7aa2ff" stroke-width="2"/><line x1="94" y1="${34+i*13}" x2="108" y2="${34+i*13}" stroke="#7aa2ff" stroke-width="2"/>`).join('')}
    <circle cx="60" cy="60" r="52" fill="none" stroke="#2bd4c4" stroke-width="2" stroke-dasharray="4 5" opacity="0.7"/>
  </svg>
  <div class="kicker">A foundations primer · Part III</div>
  <h1>Learning to <span class="hl">Verify</span></h1>
  <div class="tagline">Building deep DV judgment in the era of LLMs — <b style="color:var(--accent2)">how a newcomer earns the intuition that catches the model when it is confidently wrong, and how a lead builds a team that has it.</b></div>
  <div class="epi">
    <p>"You know my method. It is founded upon the observation of trifles."</p>
    <span class="att">— Sir Arthur Conan Doyle, Sherlock Holmes · the "trifles" are exactly what a shortcut skips — and what judgment is made of.</span>
  </div>
  <div class="eduband"><b>Two readers, one deck.</b> Read it as an <b>IC</b> for how to build judgment that lasts; read it as a <b>lead</b> for how to mentor, detect the gap, and staff for it. This teaches how to <i>learn</i> verification — it uses only public, industry-standard ideas and generic examples, and speaks to the craft, not to any specific plan, product, or person.</div>
  <div class="badgerow">
    <div class="badge"><b>Audience:</b> new DV engineers (&lt; a few years) — and the leads who grow them</div>
    <div class="badge"><b>Tension:</b> ship fast with the model — without the model doing the learning</div>
    <div class="badge"><b>Goal:</b> intuition as deep as if no LLM existed, built faster because one exists</div>
  </div>
  <div class="contact"><b>Shrikant Sundaram</b></div>
  <div class="xlink"><a href="https://slnu.github.io/Design-Verification-Cycle/#1">← Part I: The Design Verification Cycle</a> · <a href="part2.html">← Part II: The Limits of Translation</a> — this deck assumes their vocabulary.</div>
  ${foot('01 · Title')}
</div>`);

/* ---- 2. CONTENTS ---- */
slides.push(`
<div class="slide">
  <div class="kicker">What we'll cover</div>
  <h2 class="title">Contents <span class="hl">— click any section to jump</span></h2>
  <div class="sub">Parts I &amp; II were written for the engineer <i>new to DV</i>. Part III is written <b>for the new DV engineer and the lead who grows them</b>: the model can now do much of the visible work — so the danger is not that output is missing, it's that output arrives without the judgment underneath. Every section carries an <b style="color:var(--accent3)">IC lens</b> and a <b style="color:var(--accent)">Lead lens</b> where they diverge.</div>
  <div class="body"><div class="col">
    <div class="toc">
      ${[
        ['1','The trap — two ways it goes wrong','Two real patterns: the hollow deliverable, and the one who is capable only when pushed','3','4'],
        ['2','Why the shortcut wins','The forces that tilt the field — deadlines, ambiguity, culture, motivation — and who controls them','5','5'],
        ['3','Earn by hand vs delegate','The line between muscle a newcomer must grow and toil that is safe to offload','6','6'],
        ['4','Desirable difficulty','Why the struggle is the mechanism — a concrete predict-then-verify miss that teaches for life','7','7'],
        ['5','Sparring partner, not oracle','Use the model to interrogate you — and a real case of it being fluent and wrong','8','8'],
        ['6','The adversarial instinct','The senior probe turned into a habit you run on yourself — with a vacuous-pass example','9','9'],
        ['7','A practice regimen','Concrete daily and weekly drills for the first years','10','10'],
        ['8','Deepening or atrophying?','The honest tells, for the IC and for the lead watching the team','11','11'],
        ['9','So what is the solution?','No industry standard, banning wastes value, policing every task fails — verify it like a chip','12','12'],
        ['10','Close','The trained reasoner — judgment is rehearsed, not inherited','13','13']
      ].map(([n,t,d,go,pg])=>`<div class="agrow" onclick="show(${go}-1)"><div class="n">${n}</div><div><div class="t">${t}</div><div class="d">${d}</div></div><div class="pg">slide ${go}</div></div>`).join('')}
    </div>
    <div class="note">Through-line from Part II: verification does not disappear when a model can write RTL — it moves <b>up</b> to independent judgment. Part III asks the next question, from both sides: <b>how do you become the person who can do that adjudication</b> — and <b>how do you build a team of them</b> — when the rungs you'd normally climb are auto-completed?</div>
  </div></div>
  ${foot('02 · Contents')}
</div>`);

/* ---- 3. THE TRAP — two real patterns ---- */
slides.push(`
<div class="slide">
  <div class="kicker">The trap</div>
  <h2 class="title">Two ways it goes wrong <span class="hl">— both look like progress</span></h2>
  <div class="sub">Two patterns from mentoring newer engineers, told generically. Different failures — same missing thing underneath.</div>
  <div class="body">
    <div class="col">
      <div class="card" style="border-color:#ff6b6b"><h3 style="color:#ff9a9a">Pattern A — the hollow deliverable</h3>
      <ul class="clean">
        <li>Asked for a set of <b>missing tests and a test plan</b> for a block. Delivered in <b>three days</b> — complete, structured, plausible. I was impressed.</li>
        <li>I probed one level down — <i>how does the block's primary interface <span class="def">(the protocol by which it talks to the rest of the chip — its timing and ordering rules)</span> actually behave?</i> — and got <b>a blank</b>.</li>
        <li>Model-generated. It <b>looked</b> right; the understanding under it hadn't formed. The deliverable passed inspection — but the <b>derivation that would have made it stick never happened, and nothing in the process asked for it.</b></li>
      </ul></div>
      <div class="card" style="margin-top:10px;border-color:#ffcc66"><h3 style="color:#ffe1a3">Pattern B — capable only when pushed</h3>
      <ul class="clean">
        <li>A different engineer, using an <b>AI coding assistant</b>, shipped work he did not understand.</li>
        <li>But when I pushed and asked the <b>exact</b> question, he produced the <b>exact right answer</b> — the ability was there.</li>
        <li>What was missing: he never asked himself. So <b>I had to push every task and micromanage.</b> The judgment had been outsourced — to me.</li>
      </ul></div>
    </div>
    <div class="col">
      <svg class="dg" viewBox="0 0 520 330" preserveAspectRatio="xMidYMid meet">
        ${DEFS}
        <text x="260" y="24" text-anchor="middle" class="kbig" fill="#cfdaee">Same missing part, two shapes</text>
        <rect x="40" y="46" width="200" height="120" rx="14" fill="#0f2018" stroke="#39d98a" stroke-width="2"/>
        <text x="140" y="70" text-anchor="middle" fill="#39d98a" font-weight="800" font-size="12">A: surface looks done</text>
        <ellipse cx="140" cy="120" rx="72" ry="34" fill="#25121a" stroke="#ff6b6b" stroke-dasharray="5 4"/>
        <text x="140" y="118" text-anchor="middle" fill="#ff9a9a" class="lbls">understanding:</text>
        <text x="140" y="134" text-anchor="middle" fill="#ff9a9a" class="lbls">empty</text>
        <rect x="280" y="46" width="200" height="120" rx="14" fill="#221a08" stroke="#ffcc66" stroke-width="2"/>
        <text x="380" y="70" text-anchor="middle" fill="#ffe1a3" font-weight="800" font-size="12">B: right answer on demand</text>
        <ellipse cx="380" cy="120" rx="72" ry="34" fill="#16203a" stroke="#7aa2ff"/>
        <text x="380" y="118" text-anchor="middle" fill="#a9c2ff" class="lbls">understanding:</text>
        <text x="380" y="134" text-anchor="middle" fill="#a9c2ff" class="lbls">reachable, never self-started</text>
        <path d="M140 166 L235 214" class="flowO"/>
        <path d="M380 166 L285 214" class="flowO"/>
        <rect x="180" y="216" width="160" height="52" rx="10" fill="#101c36" stroke="#ff9900"/>
        <text x="260" y="238" text-anchor="middle" fill="#ff9900" font-weight="800" font-size="12">the probe</text>
        <text x="260" y="256" text-anchor="middle" class="lbls">"why is this true?"</text>
        <text x="260" y="300" text-anchor="middle" class="lbls">In both, the engineer isn't running it —</text>
        <text x="260" y="316" text-anchor="middle" class="lbls">so it either never happens (A) or falls to the lead (B).</text>
      </svg>
    </div>
  </div>
  ${lens("In both stories the fix was the same: <b>learn to run the probe on yourself</b>. No one will always be there to ask you the exact question.", "Pattern B is the expensive one: capability without self-direction means <b>you become the bottleneck</b>. If every AI-drafted task needs your push, you didn't save labor — you relocated it to micromanagement.")}
  ${foot('03 · The trap')}
</div>`);

/* ---- 4. DIAGNOSIS: conformance vs correctness, applied to the learner ---- */
slides.push(`
<div class="slide">
  <div class="kicker">The diagnosis</div>
  <h2 class="title">Part II's split — <span class="hl">now applied to the engineer</span></h2>
  <div class="sub">Part II said: a perfect translator proves <b>conformance</b> ("we built what was asked"), never <b>correctness</b> ("it's actually right"). The same split explains both patterns on the last slide.</div>
  <div class="body">
    <div class="col">
      <svg class="dg" viewBox="0 0 520 320" preserveAspectRatio="xMidYMid meet">
        <line x1="70" y1="270" x2="470" y2="270" stroke="#2b3a5e" stroke-width="1.5"/>
        <line x1="70" y1="270" x2="70" y2="40" stroke="#2b3a5e" stroke-width="1.5"/>
        <text x="270" y="300" text-anchor="middle" class="lbls">CONFORMANCE — does the output look right?</text>
        <text x="34" y="155" text-anchor="middle" class="lbls" transform="rotate(-90 34 155)">CORRECTNESS — does the engineer understand it?</text>
        <circle cx="410" cy="222" r="9" fill="#ff6b6b"/><text x="410" y="204" text-anchor="middle" fill="#ff9a9a" class="lbls">Pattern A:</text><text x="410" y="244" text-anchor="middle" fill="#ff9a9a" class="lbls">looks right, hollow</text>

        <circle cx="470" cy="148" r="5" fill="#ff6b6b"/>

        <li>Catches the model being <b>confidently wrong</b>, and says why (slide 8).</li>
        <li>Asks <b>sharper questions</b> over time, not the same ones.</li>
        <li>Feels the <b>"that smells wrong"</b> reflex before fully justifying it.</li>
      </ul></div>
    </div>
    <div class="col">
      <div class="card" style="border-color:#ff6b6b"><h3 style="color:#ff9a9a">Signs of atrophy</h3>
      <ul class="clean">
        <li><b>Can't explain</b> code "written" last week.</li>
        <li>Accepts model output <b>without a check</b> — "it's usually fine."</li>
        <li>Red results <b>stall them</b> — they paste the error and wait, rather than reason.</li>
        <li>Questions <b>aren't getting deeper</b> — same ones as months ago.</li>
        <li><b>Faster but not more capable</b>, and <b>needs a push per task</b> — the Pattern-B tell.</li>
      </ul></div>
      ${ai("This is automation complacency / over-reliance, documented before LLMs in aviation and other automated systems: when an aid is usually right, human monitoring and skill degrade, and operators miss the rare case the aid gets wrong. The lesson was never 'don't automate' — it's 'keep the human actively in the loop, or the human decays.' For a learner the aid is right often enough to be seductive and wrong often enough to be dangerous.")}
      <div class="cite">Concept: <b>automation complacency / over-reliance</b> — Parasuraman &amp; Riley, and related human-factors work. <i>Attribution to be verified against primary sources before publication.</i></div>
    </div>
  </div>
  ${lens("Speed is not the metric. <b>Can-you-explain-it-and-catch-it-when-it's-wrong is.</b> Check yourself against the right column, honestly, often.", "Watch the questions, not the throughput. A junior who ships fast but <b>needs a push per task and can't defend the work</b> is atrophying on your watch — intervene early, it compounds. And the same <b>catch-the-model-when-wrong</b> probe is your <b>interview and promotion</b> signal, not just your review one — level on demonstrated judgment, because the portfolio no longer proves it.")}
  ${foot('11 · Deepening vs atrophy')}
</div>`);

/* ---- 12. THE SOLUTION ---- */
slides.push(`
<div class="slide">
  <div class="kicker">The honest question</div>
  <h2 class="title">So what's the solution? <span class="hl">Verify it like you verify a chip</span></h2>
  <div class="sub">Missing or ambiguous docs are real, and the model genuinely helps a junior through them — used <i>wisely</i>. But the industry has <b>no standard</b> for "wisely," <b>banning</b> the model wastes its value, and <b>interrogating every task</b> or policing every review <b>does not scale</b>. So stop trying to inspect understanding exhaustively — for the exact reason Part II gives that you can't exhaustively test a chip. Apply the DV playbook to the people problem.</div>
  <div class="body">
    <div class="col">

      </svg>

        <li><b>Sample, don't exhaust</b> — probe at review, RCA, sign-off; vary and time the probe so people prepare to <i>understand</i>, not to perform. <span class="def">= coverage-directed, not exhaustive.</span></li>
        <li><b>Test by reps, not vivas</b> — have them attack their own passing tests. Whether they <i>catch the model when it's wrong</i> carries the weight; a self-authored artifact is only a conformance signal.</li>

/* ============================ ENGINE ============================ */
const deck = document.getElementById('deck');
deck.innerHTML = slides.join('');
const S = [...document.querySelectorAll('.slide')];
let i = 0;
function show(n){
  i = Math.max(0, Math.min(S.length-1, n));
  S.forEach((s,k)=>s.classList.toggle('active', k===i));
  document.getElementById('prog').style.width = ((i)/(S.length-1)*100)+'%';
  document.getElementById('num').textContent = (i+1)+' / '+S.length;
  location.hash = i+1;
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ') {show(i+1);e.preventDefault();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){show(i-1);e.preventDefault();}
  else if(e.key==='Home'){show(0);}
  else if(e.key==='End'){show(S.length-1);}
  else if(e.key.toLowerCase()==='f'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
  else if(e.key.toLowerCase()==='p'){window.print();}
  else if(e.key.toLowerCase()==='o'){document.body.classList.toggle('ov');}
});
deck.addEventListener('click',e=>{ if(e.clientX > window.innerWidth*0.62) show(i+1); else if(e.clientX < window.innerWidth*0.18) show(i-1); });
const start = parseInt(location.hash.replace('#',''))||1; show(start-1);
</script>
</body>
