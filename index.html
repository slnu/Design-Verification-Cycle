<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Design Verification Cycle — Foundations for AI-Assisted Chip Design</title>
<style>

  #deck{height:100vh;width:100vw;position:relative}

  .col{flex:1;min-width:0}
  .card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .card h3{font-size:15.5px;color:var(--accent2);margin-bottom:7px;letter-spacing:.02em}
  ul.clean{margin:5px 0 0;padding-left:18px}
  ul.clean li{margin:6px 0;color:#cfdaee;font-size:14.5px;line-height:1.48}
  ul.clean li b{color:#fff}
  .pill{display:inline-block;background:#22314f;border:1px solid var(--line);color:var(--muted);
    border-radius:999px;padding:3px 11px;font-size:12.5px;margin:3px 5px 3px 0}
  .ai{background:linear-gradient(180deg,#241a08,#1a1405);border:1px solid #6b4c12;border-radius:12px;padding:12px 15px;margin-top:12px}
  .ai .tag{color:var(--accent);font-weight:800;font-size:12px;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:8px}

  .ai .bulb{width:16px;height:16px;display:inline-block}
  .footer{position:absolute;left:64px;right:64px;bottom:24px;display:flex;justify-content:space-between;align-items:center;color:#63769a;font-size:12.5px;border-top:1px solid var(--line);padding-top:12px}
  .footer .brand{font-weight:700;color:#8fa3c6;letter-spacing:.04em}
  .progress{position:absolute;left:0;bottom:0;height:3px;background:var(--accent);transition:width .25s}
  .num{position:absolute;right:20px;bottom:22px;color:#5b6d90;font-size:12px}
  .hint{position:absolute;left:20px;bottom:22px;color:#3d4c6b;font-size:11px}
  /* diagram helpers */
  svg{width:100%;height:100%;display:block}
  .dg{width:100%;height:100%;min-height:0}
  text{font-family:"Segoe UI",Roboto,Arial,sans-serif}

  .lbls{fill:var(--muted);font-size:11px}
  .box{fill:var(--panel2);stroke:var(--line);stroke-width:1.4}
  .flow{stroke:var(--muted);stroke-width:2;fill:none;marker-end:url(#arr)}
  .flow2{stroke:var(--accent2);stroke-width:2;fill:none;marker-end:url(#arrT)}
  .flowO{stroke:var(--accent);stroke-width:2.4;fill:none;marker-end:url(#arrO)}
  .kbig{fill:#fff;font-weight:700;font-size:15px}
  /* title slide */
  .cover{align-items:flex-start;justify-content:center}
  .cover .chip{width:120px;height:120px;margin-bottom:26px}
  .cover h1{font-size:58px;font-weight:800;letter-spacing:-1px;max-width:1100px}
  .cover h1 .hl{color:var(--accent)}
  .cover .tagline{color:var(--muted);font-size:21px;margin-top:20px;max-width:900px;line-height:1.5}

  .badge b{color:var(--accent)}

  .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

  .metric .big{font-size:38px;font-weight:800;color:var(--accent)}
  .metric .cap{color:var(--muted);font-size:13px;margin-top:4px}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:6px}
  .legend span{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .sw{width:14px;height:14px;border-radius:3px;display:inline-block}
  .note{color:var(--muted);font-size:12.8px;font-style:italic;margin-top:8px}
  .quote{font-size:25px;font-weight:600;line-height:1.4;max-width:1040px;color:#fff}
  .quote .hl{color:var(--accent)}
  .small{font-size:13.4px;color:#cfdaee;line-height:1.48}

  .xlink{margin-top:10px;font-size:13.5px}

<script>
/* ============================ SLIDE CONTENT ============================ */
const bulb = '<svg class="bulb" viewBox="0 0 24 24" fill="none" stroke="#ff9900" stroke-width="2"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10c1 1 1.5 2 1.5 3h5c0-1 .5-2 1.5-3A6 6 0 0 0 12 3z"/></svg>';

/* reusable SVG defs (arrow markers) */

  <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#9fb0cc"/></marker>
  <marker id="arrT" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2bd4c4"/></marker>
  <marker id="arrO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#ff9900"/></marker>
  <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#ff6b6b"/></marker>
</defs>`;

const slides = [];

/* ---- 1. COVER ---- */
slides.push(`
<div class="slide cover">
  <svg class="chip" viewBox="0 0 120 120">

    <text x="60" y="64" fill="#2bd4c4" font-size="12" text-anchor="middle" font-weight="700">DUT</text>
    ${[...Array(5)].map((_,i)=>`<line x1="${34+i*13}" y1="26" x2="${34+i*13}" y2="12" stroke="#7aa2ff" stroke-width="2"/><line x1="${34+i*13}" y1="94" x2="${34+i*13}" y2="108" stroke="#7aa2ff" stroke-width="2"/><line x1="26" y1="${34+i*13}" x2="12" y2="${34+i*13}" stroke="#7aa2ff" stroke-width="2"/><line x1="94" y1="${34+i*13}" x2="108" y2="${34+i*13}" stroke="#7aa2ff" stroke-width="2"/>`).join('')}
  </svg>
  <div class="kicker">A foundations primer</div>
  <h1>The <span class="hl">Design Verification</span> Cycle</h1>
  <div class="tagline">How a custom AI accelerator is proven correct — start to end, across every testbench scope — and where machine learning can accelerate the work.</div>
  <div class="badgerow">
    <div class="badge"><b>Audience:</b> ML / model-training engineers entering silicon</div>
    <div class="badge"><b>Running example:</b> a DMA data-movement subsystem</div>
    <div class="badge"><b>Goal:</b> DV know-how → AI-assisted chip design</div>
  </div>
  <div class="contact"><b>Shrikant Sundaram</b></div>
  <div class="xlink"><a href="part2.html">Continue to Part II: The Limits of Translation →</a> — why DV persists in the era of AI-generated RTL.</div>
  ${foot('01 · Title')}
</div>`);

/* ---- 2. AGENDA / CONTENTS (clickable) ---- */
slides.push(`
<div class="slide">
  <div class="kicker">What we'll cover</div>
  <h2 class="title">Contents <span class="hl">— click any section to jump</span></h2>
  <div class="body"><div class="col">
    <div class="toc">
      ${[
        ['1','Why &amp; what','Why verification dominates a chip program; the black-box first principle','3','5'],
        ['2','The 10-phase cycle','Spec → plan → test harness → stimulus → checking → coverage → regression','4','21'],
        ['3','Breadth beyond one block','Dependencies you do not own; block → SoC → third-party-VIP scopes','10','14'],

        ['6','The program view','Milestones &amp; Design–DV lockstep; where a model helps, by phase and over time','31','36'],
        ['7','For model training','Why verifiable rewards fit; guardrails; takeaways','37','39']
      ].map(([n,t,d,go,pg])=>`<div class="agrow" onclick="show(${go}-1)"><div class="n">${n}</div><div><div class="t">${t}</div><div class="d">${d}</div></div><div class="pg">slides ${go}–${pg}</div></div>`).join('')}
    </div>
  </div></div>
  ${foot('02 · Contents')}
</div>`);

/* ---- 3. WHY IT MATTERS ---- */
slides.push(`
<div class="slide">
  <div class="kicker">Motivation</div>
  <h2 class="title">Why verification <span class="hl">dominates</span> a chip program</h2>
  <div class="sub">Silicon is unforgiving: a functional bug that escapes to fabrication costs a multi-million-dollar <b>respin</b> <span class="def">(re-fabricating the chip — new photomasks, months of schedule)</span> and cannot be patched in the field. Verification buys confidence <i>before</i> <b>tape-out</b> <span class="def">(the point of no return, when the design is committed to manufacturing)</span>.</div>
  <div class="body">
    <div class="col">
      <div class="three" style="grid-template-columns:1fr 1fr 1fr">
        <div class="metric"><div class="big">~60-70%</div><div class="cap">of total chip-project effort is verification</div></div>
        <div class="metric"><div class="big">$Ms</div><div class="cap">cost of a mask respin from one escaped bug</div></div>
        <div class="metric"><div class="big">10⁹+</div><div class="cap">state combinations a modern block can reach</div></div>
      </div>
      <div class="src" style="margin-top:6px;font-size:11px;color:#5b6d90">Effort share: industry surveys — <b style="color:#8fa3c6">Wilson Research Group Functional Verification Study</b> (commissioned by Siemens EDA, Harry Foster). Ranges are industry-typical; actuals must be measured per program.</div>
      <div class="card" style="margin-top:14px">
        <h3>The core problem</h3>
        <ul class="clean">
          <li>The design — its <b>RTL</b> <span class="def">(Register-Transfer Level: the source-code description of the hardware being verified)</span> — is an <b>enormous state machine</b>; exhaustive testing is impossible.</li>
          <li>Bugs hide in <b>corner cases</b> — rare interactions, <b>back-pressure</b> <span class="def">(a receiver signalling "I am full, stop" so the sender must stall)</span>, reordering, resets mid-operation.</li>
          <li>Verification's job: reach those corners on purpose, and <b>prove</b> behavior against the spec.</li>
        </ul>
      </div>
      ${ai('Model-training analogy: DV is to silicon what eval + red-teaming is to a model. Both spend most of the budget <b>proving</b> the artifact behaves, not building it. The mindset transfers — most of the budget goes to proving, not building — even though the specific techniques differ.')}
    </div>
    <div class="col card">
      <h3>Bug cost grows exponentially with time-to-find</h3>
      <div class="dg"><svg viewBox="0 0 520 340" preserveAspectRatio="xMidYMid meet">${DEFS}
        <line x1="60" y1="290" x2="500" y2="290" stroke="#2b3a5e" stroke-width="1.5"/>
        <line x1="60" y1="40" x2="60" y2="290" stroke="#2b3a5e" stroke-width="1.5"/>
        <text x="280" y="325" class="lbls" text-anchor="middle">when the bug is found →</text>
        <text x="24" y="165" class="lbls" transform="rotate(-90 24 165)" text-anchor="middle">cost to fix (log)</text>
        <path d="M70 280 Q200 275 300 235 T480 60" stroke="#ff9900" stroke-width="3" fill="none"/>
        ${[['Unit sim',70,280],['Block DV',180,262],['SoC integ',290,222],['Emulation',370,150],['Silicon',470,66]].map(([t,x,y])=>`<circle cx="${x}" cy="${y}" r="5" fill="#ff9900"/><text x="${x}" y="${y-12}" class="lbls" text-anchor="middle">${t}</text>`).join('')}
        <text x="480" y="46" fill="#ff6b6b" font-size="12" text-anchor="end" font-weight="700">respin!</text>
      </svg></div>
      <div class="note">Every phase to the right multiplies the cost of a miss. DV pushes bug-discovery as far left as possible.</div>
    </div>
  </div>
  ${foot('03 · Why verification')}
</div>`);

/* ---- 4. BIG PICTURE: THE CYCLE ---- */
slides.push(`
<div class="slide">
  <div class="kicker">The big picture</div>
  <h2 class="title">The verification cycle, <span class="hl">end to end</span></h2>
  <div class="sub">A closed loop driven by one question: <i>"Have we exercised and checked everything the spec requires?"</i> Coverage answers it; the loop repeats until the answer is yes. The ten phases, in order: <b>spec → plan → testbench → stimulus → checking → coverage → regression → debug → closure → signoff.</b></div>
  <div class="body"><div class="col card">
    <div class="dg"><svg viewBox="0 0 1080 470" preserveAspectRatio="xMidYMid meet">${DEFS}
      ${[
        ['1','Spec &\\nfeature list',60],
        ['2','Verification\\nplan',210],
        ['3','TB architecture\\n(UVM env)',360],
        ['4','Stimulus\\n(CRV)',510],
        ['5','Checkers &\\ngolden model',660],
        ['6','Functional\\ncoverage',810],
        ['7','Regression',960]
      ].map(([n,t,x],i)=>{
        const y=90; const lines=t.split('\\n');
        return `<rect x="${x-64}" y="${y}" width="128" height="70" rx="10" class="box"/>
        <circle cx="${x-46}" cy="${y+18}" r="13" fill="#ff9900"/><text x="${x-46}" y="${y+23}" text-anchor="middle" fill="#0c1222" font-weight="800" font-size="14">${n}</text>
        ${lines.map((l,li)=>`<text x="${x+8}" y="${y+22+li*15}" class="lbl" text-anchor="middle" font-size="12">${l}</text>`).join('')}
        ${i<6?`<line x1="${x+64}" y1="${y+35}" x2="${x+86-64+64}" y2="${y+35}" class="flow"/>`:''}`;
      }).join('')}
      <rect x="360" y="300" width="360" height="70" rx="10" class="box" stroke="#ff9900"/>
      <text x="540" y="330" class="lbl" text-anchor="middle" font-weight="700" fill="#ff9900">8 · Debug &amp; Root-Cause Analysis</text>
      <text x="540" y="350" class="lbls" text-anchor="middle">classify failure → fix RTL / TB / spec</text>
      <path d="M960 160 L960 335 L724 335" class="flowO"/>
      <text x="980" y="250" class="lbls" transform="rotate(90 980 250)" text-anchor="middle">fails</text>
      <path d="M360 335 L120 335 L120 300 Q120 250 210 200 L210 165" class="flow2"/>
      <text x="150" y="285" class="lbls">close coverage gaps → new tests</text>
      <rect x="770" y="300" width="230" height="70" rx="10" class="box" stroke="#39d98a"/>
      <text x="885" y="330" class="lbl" text-anchor="middle" font-weight="700" fill="#39d98a">9 · Signoff</text>

      <path d="M810 160 L810 250 L810 300" class="flow"/>

    <div class="legend">
      <span><span class="sw" style="background:#ff9900"></span> forward build</span>
      <span><span class="sw" style="background:#2bd4c4"></span> coverage-closure loop</span>
      <span><span class="sw" style="background:#39d98a"></span> exit / signoff</span>
    </div>
  </div></div>
  ${foot('04 · The cycle overview')}

/* ---- 4. WHAT IS DV: BLACK BOX ---- */
slides.push(`
<div class="slide">
  <div class="kicker">First principle</div>
  <h2 class="title">Verification is <span class="hl">black-box observation</span></h2>
  <div class="sub">The Device Under Test (DUT) is treated as a sealed box. The testbench drives its primary inputs, observes its primary outputs, and judges correctness against the specification — <i>never</i> by peeking at internal signals to decide what is "right."</div>
  <div class="body">
    <div class="col card">
      <div class="dg"><svg viewBox="0 0 520 360" preserveAspectRatio="xMidYMid meet">${DEFS}
        <rect x="180" y="90" width="170" height="180" rx="12" fill="#1d2a49" stroke="#ff9900" stroke-width="2.5"/>
        <text x="265" y="120" text-anchor="middle" fill="#ff9900" font-weight="800" font-size="16">DUT</text>
        <text x="265" y="140" text-anchor="middle" class="lbls">(the design / RTL)</text>
        <rect x="205" y="160" width="120" height="30" rx="5" fill="#16203a" stroke="#2b3a5e"/><text x="265" y="180" text-anchor="middle" class="lbls">reorder / commit</text>
        <rect x="205" y="200" width="120" height="30" rx="5" fill="#16203a" stroke="#2b3a5e"/><text x="265" y="220" text-anchor="middle" class="lbls">internal engines</text>
        <text x="265" y="255" text-anchor="middle" class="lbls" fill="#63769a">✗ TB does not model these</text>
        <rect x="20" y="150" width="120" height="60" rx="9" fill="#123" stroke="#2bd4c4"/><text x="80" y="176" text-anchor="middle" fill="#2bd4c4" font-weight="700" font-size="13">Drive inputs</text><text x="80" y="194" text-anchor="middle" class="lbls">(stimulus)</text>
        <path d="M140 180 L178 180" class="flow2"/>
        <rect x="390" y="150" width="120" height="60" rx="9" fill="#123" stroke="#2bd4c4"/><text x="450" y="176" text-anchor="middle" fill="#2bd4c4" font-weight="700" font-size="13">Observe outputs</text><text x="450" y="194" text-anchor="middle" class="lbls">(read-only)</text>
        <path d="M350 180 L388 180" class="flow2"/>
        <text x="265" y="315" text-anchor="middle" class="lbl" fill="#fff">Only the boundary is observable: buses + control/status.</text>
      </svg></div>
    </div>
    <div class="col">
      <div class="card"><h3>Two rules that prevent most false results</h3>
      <ul class="clean">
        <li><b>Golden = spec, never observed RTL.</b> If you decide "correct" by reading what the design happens to output, you can only ever prove the design agrees with itself.</li>
        <li><b>Judge at the boundary, on completion.</b> Internal transient states are the design's business; the contract lives at the pins.</li>
      </ul></div>
      <div class="card" style="margin-top:12px"><h3>Why "black box" is hard in general</h3>
      <ul class="clean">
        <li>This applies to <i>any</i> DUT — a DMA engine, a CPU, a memory controller, a protocol endpoint. Each drives many <b>transactions</b> <span class="def">(one atomic bus operation — a single read or write request/response)</span>.</li>

/* ---- 16. CHECKER INVARIANTS ---- */
slides.push(`
<div class="slide">
  <div class="kicker">Phase 5 · doctrine</div>
  <h2 class="title">Four invariants every checker <span class="hl">must honor</span></h2>
  <div class="sub">Implementations change constantly; these principles do not. They separate a checker that catches real bugs from one that produces confident-but-wrong verdicts.</div>
  <div class="body"><div class="col">
    <div class="two">
      <div class="card"><h3>1 · Match order-independently</h3><p class="small"><b>Because the same address gets reused, matching by address alone pairs the wrong items.</b> Bind each output to its request by <b>address + owner-ID</b> <span class="def">(a per-transaction/source ID the requester stamps)</span> — never by arrival order.</p></div>
      <div class="card"><h3>2 · Gate on completion</h3><p class="small"><b>A half-finished transfer is not a wrong one.</b> Compare / release a result only after the packet is fully <b>assembled and its writes are done</b> — not when the first beat shows up.</p></div>
      <div class="card"><h3>3 · Defer &amp; reorder</h3><p class="small"><b>Legal reordering must not look like a bug.</b> Hold out-of-order observations until the original issue order is <b>recoverable</b>. A <b>barrier</b> <span class="def">(an ordering fence forcing earlier ops to finish first)</span> makes this explicit; the mechanism varies, the requirement is doctrine.</p></div>
      <div class="card"><h3>4 · Prove provenance before blaming</h3><p class="small"><b>Blaming the design on a mis-matched comparison wastes a designer's time.</b> A mismatch is a real bug <b>only if</b> you proved the observed data was bound to the <i>correct</i> transaction — mis-binding under reorder impersonates a bug.</p></div>
    </div>
    ${ai('These invariants are checkable rules — a recognition (static-analysis) task, one of the strongest model fits. A model reviewing a proposed checker can audit it against them: "does this compare by arrival order? does it gate on first-beat instead of completion?" Tap-point confusion is a <b>label-noise / credit-assignment</b> hazard: bind by transaction/source ID + completion, never by bus arrival.')}
  </div></div>
  ${foot('17 · Checker invariants')}
</div>`);

slides.push(`
<div class="slide">
  <div class="kicker">For model training</div>
  <h2 class="title">Why bounded-protocol DV envs are <span class="hl">ideal</span> (DMA is one)</h2>
  <div class="sub">To make a model good at this, the training signal must be structured, checkable, and rich in the reasoning we want learned — not just code.</div>

          <li><b>RCA traces</b>: symptom → dead-ends → verified cause → classification.</li>

        <p class="small" style="margin-top:6px;color:#ffcc66">These are rarely stored as clean aligned data — assembling them is real data-pipeline work, plausibly larger than the modeling.</p></div>

        <ul class="clean">

          <li>But <b>verifiable ≠ ground truth</b>: the oracle is fallible and gameable — disagreement triggers a provenance investigation, not a blind update.</li>
          <li>Rewards range from <b>dense</b> (coverage delta) to <b>sparse</b> (a rare-seed bug reproduced over a long trajectory — hard-RL).</li>
        </ul></div>

      <p class="small">Verification is a rare engineering domain with a built-in, automatable, <i>deterministic</i> grader — a strong fit for post-/mid-training with verifiable rewards, but <b>necessary, not sufficient</b>: the grader is table stakes; the scarce reasoning traces and the reward design are the remaining work. The reward must accept any <b>spec-legal output set</b>, not one observed trace; and grader-coverage ≠ correctness (passing the known checks proves they were not broken, not that the design is correct).</p></div>

/* ---- 33. GUARDRAILS ---- */
slides.push(`
<div class="slide">
  <div class="kicker">Do it right</div>
  <h2 class="title">Guardrails — closing the <span class="hl">reward-hacking arc</span></h2>
  <div class="sub">The four false-greens from earlier are the <b>reward hacks</b> an outcome-only grader incentivizes. These guardrails are their fixes — and they are themselves <b>trainable, testable behaviors</b>: an eval suite, not just advice.</div>
  <div class="body"><div class="col">
    <div class="two">
      <div class="card"><h3>Never conform golden to the DUT</h3><p class="small">If a model "fixes" a mismatch by making the reference match observed output, it has destroyed the check. Golden derives from spec — always. <i>(Closes: golden-from-device.)</i></p></div>
      <div class="card"><h3>Never mask to go green</h3><p class="small">Silencing a check to pass a test is negative work. Classify (real bug vs TB bug) and fix the cause, not the symptom. <i>(Closes: masked check + coverage theater.)</i></p></div>
      <div class="card"><h3>Prove before blaming</h3><p class="small">Filing a design bug that is actually a testbench bug costs a designer real time. Provenance and evidence must precede any blame. <i>(Closes: easy-blame.)</i></p></div>
      <div class="card"><h3>Verify, then claim</h3><p class="small">"It should work" ≠ "it works." A generated fix/test is unproven until the sim confirms the observable effect. <i>(Closes: vacuous check.)</i></p></div>
    </div>

  </div></div>

</div>`);

/* ============================ ENGINE ============================ */
const deck = document.getElementById('deck');
deck.innerHTML = slides.join('');
const S = [...document.querySelectorAll('.slide')];
let i = 0;
function show(n){
  i = Math.max(0, Math.min(S.length-1, n));
  S.forEach((s,k)=>s.classList.toggle('active', k===i));
  document.getElementById('prog').style.width = ((i)/(S.length-1)*100)+'%';
  document.getElementById('num').textContent = (i+1)+' / '+S.length;
  location.hash = i+1;
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ') {show(i+1);e.preventDefault();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){show(i-1);e.preventDefault();}
  else if(e.key==='Home'){show(0);}
  else if(e.key==='End'){show(S.length-1);}
  else if(e.key.toLowerCase()==='f'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
  else if(e.key.toLowerCase()==='p'){window.print();}
  else if(e.key.toLowerCase()==='o'){document.body.classList.toggle('ov');}
});
deck.addEventListener('click',e=>{ if(e.clientX > window.innerWidth*0.62) show(i+1); else if(e.clientX < window.innerWidth*0.18) show(i-1); });
const start = parseInt(location.hash.replace('#',''))||1; show(start-1);
</script>
